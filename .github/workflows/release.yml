name: Create Module Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Zip Module
        run: |
          zip -r OnePlusAIPainter-${{ github.ref_name }}.zip . -x "*.git*" ".github*" "README.md"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: OnePlusAIPainter-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
